services:
  - type: web
    name: sigma-sentinel
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node --max-old-space-size=400 dist/server.js
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
